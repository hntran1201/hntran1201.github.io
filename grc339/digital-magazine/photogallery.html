        <h2>A Gallery of the Matcha Cafés Taking Over Taipei</h2>

        <section class="galleryImg">
          <figure>
            <img
              src="MatchaCafe.jpg"
              alt="Rows of green tea fields in Taiwan with a worker carrying a yellow sprayer through the crops."
            />
            <figcaption>
              Rows of tea plants curve across the hills of Taiwan as a worker
              tends to the fields during harvest season.
            </figcaption>
          </figure>
          <figure>
            <img
              src="MatchaCafe-2.jpg"
              alt="Iced matcha latte sitting on a small black café table outdoors in Taipei."
            />
            <figcaption>
              An iced matcha latte reflects the minimalist café culture that has
              become popular throughout Taipei.
            </figcaption>
          </figure>
          <figure>
            <img
              src="MatchaCafe-3.jpg"
              alt="Close-up texture of finely ground green matcha powder."
            />
            <figcaption>
              Finely ground matcha powder is known for its vibrant color and
              smooth earthy flavor.
            </figcaption>
          </figure>
          <figure>
            <img
              src="MatchaCafe-4.jpg"
              alt="Fresh green tea leaves growing in sunlight on a Taiwanese tea farm."
            />
            <figcaption>
              Fresh tea leaves grow in the mountain regions where much of
              Taiwan's tea is cultivated.
            </figcaption>
          </figure>
          <figure>
            <img
              src="MatchaCafe-5.jpg"
              alt="Person whisking bright green matcha in a ceramic bowl at a café counter."
            />
            <figcaption>
              Traditional matcha preparation techniques continue to inspire
              modern café experiences in Taipei.
            </figcaption>
          </figure>
          <figure>
            <img
              src="MatchaCafe-6.jpg"
              alt="Matcha dessert served on a red tray with a wooden spoon and green tea powder on top."
            />
            <figcaption>
              Matcha desserts combine traditional Japanese tea culture with
              modern café presentation.
            </figcaption>
          </figure>
          <figure>
            <img
              src="MatchaCafe-7.jpg"
              alt="Exterior of a matcha tea shop glowing warmly at night in the city."
            />
            <figcaption>
              Specialty tea cafés and dessert shops have become popular
              late-night destinations across Taipei.
            </figcaption>
          </figure>
          <figure>
            <img
              src="MatchaCafe-8.jpg"
              alt="Two cups of green matcha soft serve ice cream being held indoors."
            />
            <figcaption>
              Matcha soft serve has become one of the most popular desserts
              among café lovers and travelers in Taiwan.
            </figcaption>
          </figure>
        </section>
        <nav class="galleryNav">
          <label for="photo1"
            ><img
              src="MatchaCafe.jpg"
              alt="Rows of green tea fields in Taiwan."
          /></label>
          <label for="photo2"

          /></label>

            ><img src="MatchaCafe-8.jpg" alt="Two cups of matcha soft serve."
